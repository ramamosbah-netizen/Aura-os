name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: lint · typecheck · test · e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint (ESLint — TIER-2 #50)
        run: pnpm lint

      - name: ADR registry integrity (no number collisions / registry drift)
        run: pnpm adr:check

      - name: Migration policy (sequential, gap-free, @DOWN on new files — Vol 23 #25)
        run: node scripts/migration-policy-check.mjs

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit + module tests (coverage — TIER-2 #42)
        run: pnpm test:coverage

      - name: API HTTP e2e (Supertest — TIER-2 #39/#40)
        run: pnpm --filter @aura/api test:e2e

      # Non-blocking: surfaces known upstream advisories (multer/xlsx/postcss) without
      # failing the build, since no non-breaking fix is published yet (TIER-2 #43).
      - name: Dependency audit (TIER-2 #43)
        run: pnpm audit --prod || true

  # P0 #4 (Vol 23): the migration gate — the full chain must apply onto an empty
  # Postgres, be idempotent on rerun, and the built API must boot against the result.
  # P0 #5: the restore drill — seed real data, pg_dump, restore into a fresh database,
  # and verify per-table row counts match. A backup that isn't rehearsed doesn't exist.
  deploy-readiness:
    name: migration gate · boot · restore drill
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16 # migration 0019 needs `create extension vector`
        env:
          POSTGRES_USER: aura
          POSTGRES_PASSWORD: aura
          POSTGRES_DB: aura
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U aura -d aura"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgres://aura:aura@localhost:5432/aura?sslmode=disable
      PGPASSWORD: aura
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Migration gate — full chain from zero
        run: node apps/api/scripts/migrate.mjs

      - name: Migration gate — idempotent rerun applies nothing
        run: |
          out=$(node apps/api/scripts/migrate.mjs)
          echo "$out" | tail -n 2
          echo "$out" | grep -q "0 applied" || { echo "::error::migration rerun applied files — the chain is not idempotent"; exit 1; }

      # R1 (G-P0-1): tenant-isolation enforcement. The fitness check fails if any tenant-scoped
      # business table is missing RLS/FORCE/policy; the isolation test proves the policy denies
      # cross-tenant access under a real NON-BYPASSRLS role.
      - name: RLS fitness — every tenant-scoped table is protected
        run: node apps/api/scripts/rls-fitness.mjs

      - name: RLS isolation — cross-tenant access is denied under a non-bypass role
        run: node apps/api/scripts/rls-isolation-test.mjs

      - name: Build the API (workspace deps included)
        run: pnpm exec turbo run build --filter=@aura/api...

      - name: Boot the built API against the migrated database
        run: |
          cd apps/api
          AUTH_JWT_SECRET=ci-drill-secret AUTH_REQUIRED=true PORT=4300 nohup node dist/main.js > api.log 2>&1 &
          echo $! > api.pid
          for i in $(seq 1 60); do
            curl -sf http://localhost:4300/api/v1/health > /dev/null && break
            sleep 1
          done
          curl -sf http://localhost:4300/api/v1/health || { echo '--- api.log'; cat api.log; exit 1; }

      - name: SDK drift — regenerated client must match the committed one (Vol 23 #21)
        run: |
          SPEC_URL=http://localhost:4300/api/docs-json node scripts/generate-sdk.mjs
          git diff --exit-code packages/sdk/src/generated.ts

      - name: Seed the demo dataset through the live API
        run: AURA_API_URL=http://localhost:4300 node apps/api/scripts/seed-demo.mjs

      # ── R1 activation closure ──────────────────────────────────────────────────────────
      # The steps above run as the DB owner (BYPASSRLS), which proves nothing about enforcement.
      # Here we ACTIVATE the enforced role: grant `aura_app` LOGIN, boot the built API pointed at
      # it, run a representative business write through the full spine (create → event append →
      # outbox relay → tenant-scoped write + read-back), and prove DB-level fail-closed + that the
      # runtime role genuinely cannot bypass RLS. This is the runtime proof R1's DoD requires.
      - name: R1 activation — grant aura_app LOGIN
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "ALTER ROLE aura_app LOGIN PASSWORD 'aura_app_ci';"

      - name: R1 activation — boot the API as aura_app and run a business flow
        run: |
          cd apps/api
          APP_URL="postgres://aura_app:aura_app_ci@localhost:5432/aura?sslmode=disable"
          DATABASE_URL="$APP_URL" PORT=4400 nohup node dist/main.js > api-app.log 2>&1 &
          echo $! > api-app.pid
          for i in $(seq 1 60); do curl -sf http://localhost:4400/api/v1/health > /dev/null && break; sleep 1; done
          curl -sf http://localhost:4400/api/v1/health || { echo '--- api-app.log'; cat api-app.log; exit 1; }
          # representative spine write under aura_app (open mode → dev-tenant)
          resp=$(curl -sf -X POST http://localhost:4400/api/v1/crm/accounts \
            -H 'content-type: application/json' \
            -d '{"name":"RLS Activation Co","status":"prospect","industry":"Test"}') \
            || { echo '::error::business create failed under aura_app'; cat api-app.log; exit 1; }
          echo "$resp"
          echo "$resp" | grep -q '"id"' || { echo '::error::create returned no id under aura_app'; cat api-app.log; exit 1; }
          # read it back — exercises the tenant-scoped read pool under aura_app
          curl -sf "http://localhost:4400/api/v1/crm/accounts" | grep -q 'RLS Activation Co' \
            || { echo '::error::tenant-scoped read failed under aura_app'; cat api-app.log; exit 1; }

      - name: R1 activation — DB-level fail-closed + no-bypass proof under aura_app
        run: |
          APP_URL="postgres://aura_app:aura_app_ci@localhost:5432/aura?sslmode=disable"
          scoped=$(psql "$APP_URL" -tAc "SELECT set_config('app.current_tenant_id','dev-tenant',false); SELECT count(*) FROM public.aura_crm_accounts;" | tail -n1)
          closed=$(psql "$APP_URL" -tAc "SELECT set_config('app.current_tenant_id','',false); SELECT count(*) FROM public.aura_crm_accounts;" | tail -n1)
          echo "aura_app: dev-tenant rows=$scoped · no-context rows=$closed"
          test "$scoped" -gt 0 || { echo '::error::aura_app cannot read its own tenant rows'; exit 1; }
          test "$closed" = "0" || { echo '::error::RLS not fail-closed under aura_app (rows visible with no context)'; exit 1; }
          bypass=$(psql "$APP_URL" -tAc "SELECT rolbypassrls OR rolsuper FROM pg_roles WHERE rolname=current_user;" | tail -n1)
          test "$bypass" = "f" || { echo '::error::runtime role can bypass RLS'; exit 1; }

      - name: R1 activation — stop the aura_app API
        if: always()
        run: kill "$(cat apps/api/api-app.pid)" 2>/dev/null || true

      # ── R2 migration deploy-gate (G-P0-2) ──────────────────────────────────────────────
      # Prove the boot-time schema-drift gate: un-record the latest migration in the ledger so the
      # code is "ahead" of the DB, boot the built API, and assert it goes health-degraded (503) and
      # refuses business routes (503 SCHEMA_MIGRATION_PENDING) instead of 500-ing on a missing
      # column. The ledger row is restored before any assertion so later backup/restore steps see a
      # consistent DB regardless of outcome. (Only the ledger entry is touched — the schema is not.)
      - name: R2 deploy-gate — pending migration ⇒ degraded + business routes refused
        run: |
          cd apps/api
          latest=$(psql "$DATABASE_URL" -tAc "SELECT filename FROM public.aura_migrations ORDER BY filename DESC LIMIT 1" | tr -d '[:space:]')
          echo "Simulating drift by un-recording latest migration: $latest"
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "DELETE FROM public.aura_migrations WHERE filename='$latest';"
          PORT=4500 nohup node dist/main.js > api-gate.log 2>&1 &
          echo $! > api-gate.pid
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4500/api/v1/health || true)
            [ "$code" != "000" ] && break; sleep 1
          done
          health_code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4500/api/v1/health)
          health_body=$(curl -s http://localhost:4500/api/v1/health)
          biz_code=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:4500/api/v1/crm/accounts -H 'content-type: application/json' -d '{"name":"gate","status":"prospect"}')
          biz_body=$(curl -s -X POST http://localhost:4500/api/v1/crm/accounts -H 'content-type: application/json' -d '{"name":"gate","status":"prospect"}')
          echo "health: $health_code $health_body"
          echo "business: $biz_code $biz_body"
          kill "$(cat api-gate.pid)" 2>/dev/null || true
          # restore the ledger BEFORE asserting so a failed assertion can't corrupt later steps
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "INSERT INTO public.aura_migrations(filename) VALUES('$latest') ON CONFLICT DO NOTHING;"
          test "$health_code" = "503" || { echo "::error::health not degraded (got $health_code)"; cat api-gate.log; exit 1; }
          echo "$health_body" | grep -q 'degraded' || { echo '::error::health body is not degraded'; exit 1; }
          test "$biz_code" = "503" || { echo "::error::business route not refused (got $biz_code)"; cat api-gate.log; exit 1; }
          echo "$biz_body" | grep -q 'SCHEMA_MIGRATION_PENDING' || { echo '::error::business refusal code missing'; exit 1; }
          echo "✓ deploy-gate: degraded health + business routes refused while a migration is pending"

      - name: Freeze the source (stop the API) before backup
        run: |
          kill "$(cat apps/api/api.pid)" || true
          sleep 3

      - name: Orphan scan — seeded deal chain must have zero dangling references
        run: node apps/api/scripts/orphan-scan.mjs --enforce

      - name: Archiver smoke (dry-run — SQL must run; fresh data ⇒ 0 eligible)
        run: node apps/api/scripts/archive-events.mjs

      - name: Backup — pg_dump custom format
        run: pg_dump -h localhost -U aura -d aura -Fc -f aura.dump

      - name: Restore drill — into a fresh database
        run: |
          createdb -h localhost -U aura aura_restore
          pg_restore -h localhost -U aura -d aura_restore --no-owner aura.dump

      - name: Verify — per-table row counts identical, source non-empty
        run: >
          SOURCE_URL="$DATABASE_URL"
          RESTORE_URL="postgres://aura:aura@localhost:5432/aura_restore?sslmode=disable"
          node apps/api/scripts/verify-restore.mjs

      - name: API log on failure
        if: failure()
        run: |
          echo '=== owner API (api.log) ==='; cat apps/api/api.log || true
          echo '=== deploy-gate API (api-gate.log) ==='; cat apps/api/api-gate.log || true
          echo '=== aura_app API (api-app.log) ==='; cat apps/api/api-app.log || true

  # P0 #3: secret scanning — fail the build when a credential-shaped string lands in
  # the diff. Rotation/revocation procedure: docs/runbooks/secrets-rotation.md.
  secret-scan:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # P0 #4: the deployable artifacts. Both images build on every PR; pushes to main
  # publish them to GHCR so a tagged, runnable image exists for every main commit.
  docker-images:
    name: docker images (api + web)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Image repositories must be lowercase; github.repository is "Aura-os".
      - name: Compute lowercase image namespace
        id: ns
        run: echo "ns=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and on main, push) the API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ steps.ns.outputs.ns }}/api:latest
            ${{ steps.ns.outputs.ns }}/api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build (and on main, push) the web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ steps.ns.outputs.ns }}/web:latest
            ${{ steps.ns.outputs.ns }}/web:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

  web-smoke:
    name: web smoke (Playwright — TIER-2 #41)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # The web app imports @aura/shared (form engine core), whose package
      # entry points at dist/ — build workspace deps before the dev server.
      - name: Build workspace dependencies
        run: pnpm --filter @aura/web^... build

      - name: Install Chromium
        run: pnpm --filter @aura/web exec playwright install --with-deps chromium

      - name: Smoke
        run: pnpm --filter @aura/web e2e
        env:
          CI: 'true'
