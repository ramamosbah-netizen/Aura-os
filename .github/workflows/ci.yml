name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: lint · typecheck · test · e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint (ESLint — TIER-2 #50)
        run: pnpm lint

      - name: ADR registry integrity (no number collisions / registry drift)
        run: pnpm adr:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit + module tests (coverage — TIER-2 #42)
        run: pnpm test:coverage

      - name: API HTTP e2e (Supertest — TIER-2 #39/#40)
        run: pnpm --filter @aura/api test:e2e

      # Non-blocking: surfaces known upstream advisories (multer/xlsx/postcss) without
      # failing the build, since no non-breaking fix is published yet (TIER-2 #43).
      - name: Dependency audit (TIER-2 #43)
        run: pnpm audit --prod || true

  migration-gate:
    name: migration gate (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aura_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/aura_ci
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Gate: every migration in infrastructure/migrations/ must apply cleanly onto a fresh DB.
      # A broken or out-of-order migration fails the PR — you cannot ship a schema that won't build.
      - name: Apply migrations (fresh DB)
        run: pnpm --filter @aura/api db:migrate

      # Idempotency: re-running must be a no-op (the migrate runner records applied files).
      - name: Re-apply migrations (must be a no-op)
        run: pnpm --filter @aura/api db:migrate

  web-smoke:
    name: web smoke (Playwright — TIER-2 #41)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # The web app imports @aura/shared (form engine core), whose package
      # entry points at dist/ — build workspace deps before the dev server.
      - name: Build workspace dependencies
        run: pnpm --filter @aura/web^... build

      - name: Install Chromium
        run: pnpm --filter @aura/web exec playwright install --with-deps chromium

      - name: Smoke
        run: pnpm --filter @aura/web e2e
        env:
          CI: 'true'

  docker-build:
    name: docker build (API image)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Verifies the production Dockerfile builds (gap #4) — a broken image fails the PR.
      - name: Build API image
        run: docker build -t aura-api:ci .
