# Workspace layout mirrors the clean-architecture blueprint:
#   apps/*         deployables (api = NestJS host, web = Next.js shell)
#   shared         framework-free types + value objects + event contracts
#   core           the kernel (tenancy, events, outbox, workflow, audit) as a Nest library
#   modules/*      business modules (one bounded context each) — added from T1
#   intelligence   AI brain (read-only consumers) — added from T4
#   infrastructure DB clients, Supabase, event-bus impls, config
packages:
  - "apps/*"
  - "shared"
  - "core"
  - "modules/*"
  - "intelligence"
  - "infrastructure"

# Build-script policy. Every dependency that ships a postinstall/native build step must
# be listed with an explicit true/false — otherwise `pnpm install` stops on the
# "ignored build scripts" prompt and exits non-zero, which would break CI.
#   esbuild / sharp → native binaries we need built.
#   @scarf/scarf    → analytics beacon; never run.
#   @swc/core       → ships prebuilt platform binaries; no build needed.
#   core-js         → postinstall ad; never run.
onlyBuiltDependencies:
  - esbuild
  - sharp
allowBuilds:
  esbuild: true
  sharp: true
  '@scarf/scarf': false
  '@swc/core': false
  core-js: false
